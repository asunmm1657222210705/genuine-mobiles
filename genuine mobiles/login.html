<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin Login - Genuine Mobile's</title>
<link rel="stylesheet" href="../css/style.css" />
</head>
<body>
<div class="container">
  <div class="login-box">
    <h1>🔐 Admin Login</h1>
    <div id="err" class="error-msg" style="display:none"></div>
    <form id="loginForm">
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="user" required value="admin"/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="pass" required />
      </div>
      <button type="submit" class="btn btn-primary btn-block">Login</button>
    </form>
    <p style="text-align:center;margin-top:16px;color:#888;font-size:13px">
      Demo credentials: <strong>admin / admin123</strong>
    </p>
    <p style="text-align:center;margin-top:8px">
      <a href="../index.html" style="color:#0d6efd">← Back to site</a>
    </p>
  </div>
</div>
<script src="../js/db.js"></script>
<script>
document.getElementById('loginForm').addEventListener('submit', e => {
  e.preventDefault();
  const ok = DB.login(document.getElementById('user').value, document.getElementById('pass').value);
  if (ok) location.href = 'dashboard.html';
  else { const er = document.getElementById('err'); er.textContent='Invalid credentials'; er.style.display='block'; }
});
</script>
</body>
</html>
